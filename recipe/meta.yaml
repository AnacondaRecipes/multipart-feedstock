{% set name = "multipart" %}
{% set version = "1.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/multipart-{{ version }}.tar.gz
  sha256: a46bd6b0eb4c1ba865beb88ddd886012a3da709b6e7b86084fc37e99087e5cf1

build:
  skip: true  # [py<38]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - pip
    - flit-core >=3.9,<4
  run:
    - python

test:
  source_files:
    - test
  imports:
    - multipart
  commands:
    - pip check
    - pytest -v test
  requires:
    - pip
    - pytest

about:
  home: https://github.com/defnull/multipart
  summary: A fast multipart/form-data parser for python
  description: |
    This module provides a parser for the multipart/form-data format.
    It can read from a file, a socket or a WSGI environment. The parser
    can be used to replace cgi.FieldStorage to work around its limitations.
  license: MIT
  license_file: LICENSE
  license_family: MIT
  dev_url: https://github.com/defnull/multipart
  doc_url: https://github.com/defnull/multipart

extra:
  recipe-maintainers:
    - JamesRobertsonGames
